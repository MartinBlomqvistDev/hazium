<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Hazium">
  <title>Hazium</title>
  <!-- A periodic-table tile, per the project's own line: Hazium is a fictional
       element, because the periodic table of public evidence is missing one.
       Surfaces and accent are the site's tokens (#0d0d0d, #d95926) so the tab
       icon and the page read as one thing. -->
  <rect width="32" height="32" rx="6" fill="#0d0d0d"/>
  <rect x="1.75" y="1.75" width="28.5" height="28.5" rx="4.75" fill="none"
        stroke="#d95926" stroke-width="2"/>
  <text x="16" y="22.5" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="17" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Hz</text>
</svg>
